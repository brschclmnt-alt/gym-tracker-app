// ══════════════════════════════════════════════════════════════
//  LOGIQUE DE PROGRESSION
// ══════════════════════════════════════════════════════════════
function getIncrement(kg){const n=parseFloat(kg)||0;return n<20?1:n<50?2.5:5;}

function getProgression(prev,repRange){
  if(!prev||!prev.kg||!prev.reps)return null;
  const[minR,maxR]=(repRange||"8-12").split("-").map(Number);
  const reps=parseInt(prev.reps)||0,kg=parseFloat(prev.kg)||0;
  const rir=prev.rir==="échec"?0:(parseInt(prev.rir)||0);
  const inc=getIncrement(kg);
  if(reps>=maxR&&rir>=2)return{msg:"↑ Passe à "+(kg+inc)+"kg",skg:kg+inc,color:"#C8FF00"};
  if(reps>=maxR&&rir>=1)return{msg:"↑ Essaie "+(kg+inc/2)+"kg",skg:kg+inc/2,color:"#9DFF00"};
  if(reps>=minR&&rir>=1)return{msg:"→ Vise "+maxR+" reps",skg:kg,color:"#FFB800"};
  if(reps<minR)return{msg:"↓ Réduis à "+Math.max(0,kg-inc)+"kg",skg:Math.max(0,kg-inc),color:"#FF5555"};
  return{msg:"→ Maintiens",skg:kg,color:"#555"};
}

// ══════════════════════════════════════════════════════════════
//  CONSTRUCTION DES EXERCICES (logique mise à jour)
//  Pour chaque muscle priorisé :
//    1. isolation à forte tension d'étirement
//    2. polyarticulaire à forte tension d'étirement
//    3. (si slot dispo) isolation à forte tension de contraction
//  Pour les autres muscles : polyarticulaire étirement d'abord
// ══════════════════════════════════════════════════════════════
function buildExercises(type,splitDef,priority,count,customDB){
  customDB=customDB||{};
  const muscles=splitDef.sessions[type].muscles;
  const allDB=Object.assign({},DB,customDB);

  // ── Tri : priorisés en tête ──
  const sorted=[...muscles].sort((a,b)=>{
    const ai=priority.indexOf(a),bi=priority.indexOf(b);
    if(ai===-1&&bi===-1)return 0;
    if(ai===-1)return 1;if(bi===-1)return-1;
    return ai-bi;
  });

  const numMuscles=sorted.length;
  const prioritized=sorted.filter(m=>priority.includes(m));

  // ── Calcul des slots par muscle (distribution par rounds) ──
  // Round 1 : 1 slot (poly) pour chaque muscle — toujours
  // Round 2 : 1 slot (iso) pour chaque muscle — si slots disponibles
  // Round 3+ : slots bonus aux priorisés puis à tous
  const slotsMap={};
  sorted.forEach(m=>slotsMap[m]=0);
  let remaining=count;

  // Round 1 : 1 slot poly pour tous
  for(const m of sorted){if(remaining>0){slotsMap[m]++;remaining--;}}
  // Round 2 : 1 slot iso pour tous (ordre : priorisés d'abord)
  const round2=[...prioritized,...sorted.filter(m=>!prioritized.includes(m))];
  for(const m of round2){if(remaining>0){slotsMap[m]++;remaining--;}}
  // Rounds suivants : extras aux priorisés en premier, puis à tous
  let extraRound=[...prioritized,...sorted];
  while(remaining>0){
    let distributed=false;
    for(const m of extraRound){if(remaining>0){slotsMap[m]++;remaining--;distributed=true;}}
    if(!distributed)break;
  }

  // ── Helpers ──
  const usedP=new Set();
  const getIso=(m)=>{
    const pats=(allDB[m]&&allDB[m].patterns)||{};
    for(const[pk,pd]of Object.entries(pats)){
      if(!COMPOUNDS.includes(pk)&&!usedP.has(m+"_"+pk))return{m,pk,...pd};
    }
    return null;
  };
  const getPoly=(m)=>{
    const pats=(allDB[m]&&allDB[m].patterns)||{};
    for(const[pk,pd]of Object.entries(pats)){
      if(COMPOUNDS.includes(pk)&&!usedP.has(m+"_"+pk))return{m,pk,...pd};
    }
    return null;
  };
  const getAny=(m)=>getPoly(m)||getIso(m);

  const selected=[];
  const add=(ex)=>{
    if(!ex||selected.length>=count)return false;
    usedP.add(ex.m+"_"+ex.pk);
    selected.push(ex);
    return true;
  };

  // ── Construction muscle par muscle ──
  // Ordre dans la séance : iso d'abord (étirement), puis poly
  // Mais en distribution des slots : poly garanti en priorité (round 1)
  // Résultat dans la carte : on trie iso→poly pour l'ordre d'affichage final
  for(const m of sorted){
    const slots=slotsMap[m]||1;
    const exosForMuscle=[];
    if(slots===1){
      // 1 seul slot : poly prioritaire (meilleur rapport volume/exercice)
      const ex=getPoly(m)||getIso(m);
      if(ex)exosForMuscle.push(ex);
    } else {
      // slot 1 : isolation étirement
      const iso=getIso(m)||getPoly(m);
      if(iso)exosForMuscle.push(iso);
      // slot 2 : polyarticulaire
      const poly=getPoly(m);
      if(poly)exosForMuscle.push(poly);
      // slot 3+ : alternance (iso en 3, poly en 4, etc.)
      for(let s=2;s<slots;s++){
        const ex=s%2===0?(getIso(m)||getPoly(m)):(getPoly(m)||getIso(m));
        if(ex)exosForMuscle.push(ex);
      }
    }
    for(const ex of exosForMuscle) add(ex);
  }

  // ── Remplissage résiduel ──
  for(const m of sorted){
    if(selected.length>=count)break;
    let ex=getAny(m);
    while(ex&&selected.length<count){add(ex);ex=getAny(m);}
  }

  return selected.map(p=>({
    id:uid(),
    pattern:p.label,
    muscle:p.m,
    repRange:RR[p.pk]||"8-12",
    alts:(p.ex.length>=3?p.ex:[...p.ex,...p.ex]).slice(0,3),
    sel:0,
    sets:[1,2,3].map(n=>({id:uid(),n,kg:"",reps:"",rir:"",repRange:RR[p.pk]||"8-12"})),
    note:""
  }));
}

async function fbSave(code,data){
  try{await db.collection("trackers").doc(code).set({data:JSON.stringify(data),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});}
  catch(e){console.error("Save error:",e);}
}
async function fbLoad(code){
  try{const doc=await db.collection("trackers").doc(code).get();return doc.exists?JSON.parse(doc.data().data):null;}
  catch(e){console.error("Load error:",e);return null;}
}

//  SYNC SCREEN
// ══════════════════════════════════════════════════════════════
function SyncScreen({onSync}){
  const[code,setCode]=useState("");
  const[loading,setLoading]=useState(false);
  const[error,setError]=useState("");
  const handleSync=async()=>{
    const trimmed=code.trim().toLowerCase().replace(/\s+/g,"_");
    if(trimmed.length<4){setError("Code trop court (min 4 caractères)");return;}
    setLoading(true);setError("");
    const data=await fbLoad(trimmed);
    localStorage.setItem(SYNC_KEY,trimmed);
    onSync(trimmed,data);
    setLoading(false);
  };
  return(
    <div style={col({minHeight:"100vh",alignItems:"center",justifyContent:"center",padding:28,gap:24})}>
      <div style={col({alignItems:"center",gap:8})}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:44,fontWeight:900,letterSpacing:4,color:T.accent,lineHeight:1}}>GYM TRACKER</div>
        <div style={{color:T.muted,fontSize:14,textAlign:"center",maxWidth:280,lineHeight:1.6}}>Entre ton code de synchronisation pour accéder à tes données sur tous tes appareils</div>
      </div>
      <div style={col({gap:10,width:"100%",maxWidth:320})}>
        <input value={code} onChange={e=>setCode(e.target.value)} onKeyDown={e=>e.key==="Enter"&&handleSync()} placeholder="Ex: clement_gym_2025" style={inp({fontSize:17,padding:"13px 14px",textAlign:"center",letterSpacing:1})} autoFocus/>
        {error&&<div style={{color:"#FF5555",fontSize:12,textAlign:"center"}}>{error}</div>}
        <Btn active onClick={handleSync} disabled={loading||code.trim().length<4} style={{padding:14,fontSize:16}}>{loading?"Chargement...":"Accéder →"}</Btn>
      </div>
      <div style={{color:"#333",fontSize:12,textAlign:"center",maxWidth:280,lineHeight:1.7,borderTop:"1px solid #1a1a1a",paddingTop:20}}>
        Première fois ? Invente un code unique.<br/>Même code sur tous tes appareils = mêmes données.
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  FREE EX PICKER — sélection libre parmi tous les exercices
//  (utilisé dans la création de zéro)
// ══════════════════════════════════════════════════════════════
function FreeExPicker({customDB,onPick,onClose}){
  const[search,setSearch]=useState("");
  const[selectedMuscle,setSelectedMuscle]=useState(null);
  const allDB=Object.assign({},DB,customDB);

  // Construire la liste plate de tous les exercices
  const allExs=Object.entries(allDB).flatMap(([mk,mv])=>
    Object.entries(mv.patterns||{}).flatMap(([pk,pd])=>
      pd.ex.map(exName=>({mk,pk,pd,mv,exName}))
    )
  );

  const filtered=search.length>1
    ?allExs.filter(e=>e.exName.toLowerCase().includes(search.toLowerCase()))
    :selectedMuscle
      ?allExs.filter(e=>e.mk===selectedMuscle)
      :null;

  return(
    <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:14,padding:16}}>
      <div style={row({justifyContent:"space-between",marginBottom:10})}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:18,fontWeight:700,letterSpacing:1}}>Ajouter un exercice</div>
        {onClose&&<button onClick={onClose} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:20}}>✕</button>}
      </div>
      <input
        value={search}
        onChange={e=>setSearch(e.target.value)}
        placeholder="🔍 Rechercher..."
        style={inp({marginBottom:10,fontSize:14})}
        autoFocus
      />
      {!search&&(
        <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:10}}>
          <div onClick={()=>setSelectedMuscle(null)} style={{padding:"5px 10px",borderRadius:20,border:"1px solid "+(selectedMuscle===null?T.accent:T.border),background:selectedMuscle===null?"rgba(200,255,0,0.07)":"transparent",cursor:"pointer",fontSize:12,color:selectedMuscle===null?T.accent:T.muted}}>Tous</div>
          {Object.entries(allDB).map(([mk,mv])=>(
            <div key={mk} onClick={()=>setSelectedMuscle(selectedMuscle===mk?null:mk)} style={{padding:"5px 10px",borderRadius:20,border:"1px solid "+(selectedMuscle===mk?T.accent:T.border),background:selectedMuscle===mk?"rgba(200,255,0,0.07)":"transparent",cursor:"pointer",fontSize:12,color:selectedMuscle===mk?T.accent:T.muted}}>{mv.label}</div>
          ))}
        </div>
      )}
      <div style={{maxHeight:300,overflowY:"auto"}}>
        {filtered?filtered.map(({mk,pk,pd,mv,exName},i)=>(
          <div key={i} onClick={()=>onPick(mk,pk,pd,exName)} style={{padding:"9px 12px",borderRadius:8,cursor:"pointer",border:"1px solid "+T.border,fontSize:14,marginBottom:5,background:T.surface}}>
            <div>{exName}</div>
            <div style={{color:T.muted,fontSize:11,marginTop:2}}>{mv.label} · {pd.label}</div>
          </div>
        )):(
          <div style={{color:T.muted,fontSize:13,textAlign:"center",padding:"20px 0"}}>
            Sélectionne un groupe musculaire ou tape le nom d'un exercice
          </div>
        )}
        {filtered&&filtered.length===0&&<div style={{color:T.muted,textAlign:"center",padding:16}}>Aucun résultat</div>}
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  EXPICKER
// ══════════════════════════════════════════════════════════════
function ExPicker({customDB,onPick,onClose}){

// ══════════════════════════════════════════════════════════════
//  EXCARD — mode setup : rep ranges par série (sans kg/reps)
//          mode log    : kg/reps/rir + repRange affiché
// ══════════════════════════════════════════════════════════════
function ExCard({ex,prevEx,onChange,onRemove,setupMode}){
  const[open,setOpen]=useState(true);
  const updSet=(sid,f,v)=>onChange({...ex,sets:ex.sets.map(s=>s.id===sid?{...s,[f]:v}:s)});
  const addSet=()=>onChange({...ex,sets:[...ex.sets,{id:uid(),n:ex.sets.length+1,kg:"",reps:"",rir:"",repRange:ex.repRange||"8-12"}]});
  const delSet=(sid)=>{if(ex.sets.length<=1)return;onChange({...ex,sets:ex.sets.filter(s=>s.id!==sid).map((s,i)=>({...s,n:i+1}))});};

  return(
    <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:14,overflow:"hidden",marginBottom:12}}>
      {/* EN-TÊTE */}
      <div onClick={()=>setOpen(o=>!o)} style={{padding:"14px 16px",cursor:"pointer"}}>
        <div style={row({justifyContent:"space-between"})}>
          <div style={col({gap:3})}>
            <div style={{color:T.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>{ex.pattern} · {(DB[ex.muscle]&&DB[ex.muscle].label)||ex.muscle}</div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:21,fontWeight:700,letterSpacing:0.5}}>{ex.alts[ex.sel]}</div>
            {setupMode&&<div style={{color:"#444",fontSize:11,marginTop:1}}>Appuie pour configurer les séries</div>}
          </div>
          <div style={row({gap:8})}>
            {onRemove&&<button onClick={e=>{e.stopPropagation();onRemove();}} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:16,padding:4}}>✕</button>}
            <span style={{color:T.muted}}>{open?"↑":"↓"}</span>
          </div>
        </div>
      </div>

      {open&&(
        <div style={{padding:"0 16px 16px",borderTop:"1px solid "+T.border}}>
          {/* CHOIX D'EXERCICE — uniquement en mode setup si plusieurs alternatives */}
          {setupMode&&ex.alts.length>1&&(
          <div style={col({gap:6,paddingTop:12,marginBottom:14})}>
            <div style={{color:T.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>Choix d'exercice</div>
            {ex.alts.map((a,i)=>(
              <div key={i} onClick={()=>onChange({...ex,sel:i})} style={{padding:"8px 12px",borderRadius:8,cursor:"pointer",background:ex.sel===i?"rgba(200,255,0,0.07)":"transparent",border:"1px solid "+(ex.sel===i?T.accent:T.border),fontSize:14,display:"flex",alignItems:"center",gap:10}}>
                <div style={{width:13,height:13,borderRadius:"50%",border:"2px solid "+(ex.sel===i?T.accent:T.muted),background:ex.sel===i?T.accent:"transparent",flexShrink:0}}/>
                {a}
              </div>
            ))}
          </div>
          )}

          {/* ── MODE SETUP : rep range par série ── */}
          {setupMode&&(
            <>
              <div style={row({justifyContent:"space-between",paddingBottom:8,borderBottom:"1px solid "+T.border,marginBottom:8})}>
                <div style={{color:T.muted,fontSize:10,textTransform:"uppercase",letterSpacing:1,width:28,textAlign:"center"}}>#</div>
                <div style={{color:T.muted,fontSize:10,textTransform:"uppercase",letterSpacing:1,flex:1,paddingLeft:8}}>REP RANGE</div>
                <div style={{width:28}}></div>
              </div>
              {ex.sets.map((s)=>{
                const setRR=s.repRange||ex.repRange||"8-12";
                return(
                  <div key={s.id} style={{display:"grid",gridTemplateColumns:"28px 1fr 28px",gap:6,alignItems:"center",marginBottom:8}}>
                    <div style={{color:T.muted,fontSize:12,textAlign:"center",fontFamily:"'DM Mono',monospace"}}>S{s.n}</div>
                    <select value={setRR} onChange={e=>updSet(s.id,"repRange",e.target.value)} style={inp({padding:"8px 10px",cursor:"pointer"})}>
                      {REP_RANGES.map(r=><option key={r} value={r}>{r} reps</option>)}
                    </select>
                    <button onClick={()=>delSet(s.id)} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:14,padding:0,textAlign:"center"}}>✕</button>
                  </div>
                );
              })}
            </>
          )}

          {/* ── MODE LOG : kg / reps / rir avec repRange affiché ── */}
          {!setupMode&&(
            <>
              <div style={{display:"grid",gridTemplateColumns:"58px 1fr 1fr 80px 22px",gap:6,paddingBottom:6,borderBottom:"1px solid "+T.border,marginBottom:6}}>
                {["SÉRIE","KG","REPS","RIR",""].map((h,i)=><div key={i} style={{color:T.muted,fontSize:10,textTransform:"uppercase",letterSpacing:1,textAlign:"center"}}>{h}</div>)}
              </div>
              {ex.sets.map((s,si)=>{
                const setRR=s.repRange||ex.repRange||"8-12";
                const prev=prevEx&&prevEx.sets&&(prevEx.sets.find(ps=>ps.n===s.n)||prevEx.sets[si]);
                const prog=prev?getProgression(prev,setRR):null;
                return(
                  <div key={s.id} style={{marginBottom:8}}>
                    <div style={{display:"grid",gridTemplateColumns:"58px 1fr 1fr 80px 22px",gap:6,alignItems:"center"}}>
                      <div style={col({alignItems:"center",gap:1})}>
                        <div style={{color:T.muted,fontSize:12,fontFamily:"'DM Mono',monospace"}}>S{s.n}</div>
                        <div style={{color:T.accent,fontSize:10,fontFamily:"'DM Mono',monospace",fontWeight:700}}>{setRR}</div>
                      </div>
                      <input type="number" placeholder={prog?String(prog.skg):"—"} value={s.kg} onChange={e=>updSet(s.id,"kg",e.target.value)} style={inp({textAlign:"center",padding:"7px 4px"})}/>
                      <input type="number" placeholder="—" value={s.reps} onChange={e=>updSet(s.id,"reps",e.target.value)} style={inp({textAlign:"center",padding:"7px 4px"})}/>
                      <select value={s.rir} onChange={e=>updSet(s.id,"rir",e.target.value)} style={inp({padding:"7px 4px",cursor:"pointer"})}>
                        <option value="">—</option>
                        {["0","1","2","3","4","échec"].map(r=><option key={r} value={r}>{r==="échec"?"Échec":r+" RIR"}</option>)}
                      </select>
                      {setupMode&&<button onClick={()=>delSet(s.id)} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:14,padding:0}}>✕</button>}
                    </div>
                    {prog&&<div style={{marginTop:3,paddingLeft:34,fontSize:11,fontWeight:600,color:prog.color}}>{prog.msg}</div>}
                    {prev&&prev.kg&&<div style={{marginTop:1,paddingLeft:34,fontSize:11,color:T.muted}}>Préc: {prev.kg}kg × {prev.reps} reps{prev.rir?" · "+prev.rir+" RIR":""}</div>}
                  </div>
                );
              })}
            </>
          )}

          {setupMode&&<button onClick={addSet} style={{background:"none",border:"1px dashed "+T.border,borderRadius:8,color:T.muted,padding:"7px 0",cursor:"pointer",fontSize:13,fontFamily:"inherit",width:"100%",marginTop:4}}>+ Série</button>}
          <div style={col({gap:5,marginTop:12})}>
            <div style={{color:T.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>Note / Ressenti</div>
            <textarea value={ex.note} onChange={e=>onChange({...ex,note:e.target.value})} placeholder="Ressenti, douleur, fatigue..." style={{...inp(),resize:"vertical",minHeight:50,fontFamily:"'DM Sans',sans-serif",fontSize:13,padding:8}}/>
          </div>
        </div>
      )}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  SETUP — étape 0 : choix du split + option "de zéro"
// ══════════════════════════════════════════════════════════════
function Setup({onDone,onCustom}){
  const[step,setStep]=useState(0);
  const[d,setD]=useState({split:null,days:null,exCount:5,priority:[]});
  const set=(k,v)=>setD(p=>({...p,[k]:v}));
  const toggleP=(m)=>setD(p=>({...p,priority:p.priority.includes(m)?p.priority.filter(x=>x!==m):[...p.priority,m]}));
  const sd=d.split?SPLITS[d.split]:null;
  const canNext=[d.split!==null,d.days!==null,true][step];
  return(
    <div style={col({minHeight:"100vh",padding:"20px 16px",gap:20})}>
      <div style={{paddingTop:16}}>
        <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:34,fontWeight:900,letterSpacing:3,color:T.accent,lineHeight:1}}>NOUVEAU PROGRAMME</div>
        <div style={{color:T.muted,fontSize:13,marginTop:4}}>{["Choisis ton split","Configure","Priorités musculaires"][step]}</div>
      </div>
      <div style={row({gap:6})}>
        {[0,1,2].map(i=><div key={i} style={{flex:1,height:3,borderRadius:2,background:i<=step?T.accent:T.border}}/>)}
      </div>

      {step===0&&(
        <div style={col({gap:8})}>
          {Object.entries(SPLITS).map(([k,s])=>(
            <div key={k} onClick={()=>set("split",k)} style={{background:d.split===k?"rgba(200,255,0,0.07)":T.card,border:"1px solid "+(d.split===k?T.accent:T.border),borderRadius:12,padding:"15px 16px",cursor:"pointer"}}>
              <div style={row({justifyContent:"space-between"})}>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,letterSpacing:1}}>{s.name}</div>
                {d.split===k&&<span style={{color:T.accent}}>✓</span>}
              </div>
              <div style={{color:T.muted,fontSize:12,marginTop:2}}>{s.sub}</div>
            </div>
          ))}
          {/* OPTION DE ZÉRO */}
          <div onClick={onCustom} style={{background:"transparent",border:"1px dashed "+T.border,borderRadius:12,padding:"15px 16px",cursor:"pointer",marginTop:4}}>
            <div style={row({justifyContent:"space-between"})}>
              <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:22,fontWeight:700,letterSpacing:1,color:T.muted}}>Créer de zéro</div>
              <span style={{color:T.muted,fontSize:18}}>→</span>
            </div>
            <div style={{color:"#333",fontSize:12,marginTop:2}}>Programme 100% personnalisé</div>
          </div>
        </div>
      )}

      {step===1&&sd&&(
        <div style={col({gap:18})}>
          <div style={col({gap:8})}>
            <div style={{color:T.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>Jours/semaine</div>
            <div style={row({gap:8,flexWrap:"wrap"})}>{sd.days.map(n=><Btn key={n} active={d.days===n} onClick={()=>set("days",n)} style={{width:50,height:50,padding:0,fontSize:18,borderRadius:10}}>{n}</Btn>)}</div>
          </div>
          <div style={col({gap:8})}>
            <div style={{color:T.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1}}>Exercices/séance</div>
            <div style={row({gap:8,flexWrap:"wrap"})}>{[4,5,6,7,8].map(n=><Btn key={n} active={d.exCount===n} onClick={()=>set("exCount",n)} style={{width:50,height:50,padding:0,fontSize:18,borderRadius:10}}>{n}</Btn>)}</div>
          </div>
          {d.days&&(
            <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:14}}>
              <div style={{color:T.muted,fontSize:11,textTransform:"uppercase",letterSpacing:1,marginBottom:8}}>Aperçu</div>
              {sd.schedules[d.days].map((t,i)=>(
                <div key={i} style={row({gap:10,padding:"4px 0",borderBottom:i<sd.schedules[d.days].length-1?"1px solid "+T.border:"none"})}>
                  <div style={{color:T.muted,fontSize:12,width:22}}>J{i+1}</div>
                  <div style={{fontSize:14}}>{sd.sessions[t].name}</div>
                </div>
              ))}
            </div>
          )}
        </div>
      )}

      {step===2&&(
        <div style={col({gap:10})}>
          <div style={{color:T.muted,fontSize:13,lineHeight:1.6}}>Muscles à prioriser — pour chaque muscle priorisé, la séance commencera par une isolation étirement puis un polyarticulaire étirement.</div>
          {Object.entries(DB).map(([k,v])=>{
            const idx=d.priority.indexOf(k);const sel=idx!==-1;
            return(
              <div key={k} onClick={()=>toggleP(k)} style={{background:sel?"rgba(200,255,0,0.06)":T.card,border:"1px solid "+(sel?T.accent:T.border),borderRadius:10,padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
                <div style={{fontSize:15}}>{v.label}</div>
                {sel&&<div style={{background:T.accent,color:"#000",borderRadius:"50%",width:22,height:22,display:"flex",alignItems:"center",justifyContent:"center",fontSize:12,fontWeight:700}}>{idx+1}</div>}
              </div>
            );
          })}
        </div>
      )}

      <div style={row({gap:8,marginTop:"auto",paddingBottom:20})}>
        {step>0&&<Btn onClick={()=>setStep(s=>s-1)} style={{flex:1}}>← Retour</Btn>}
        {step<2
          ?<Btn active onClick={()=>setStep(s=>s+1)} disabled={!canNext} style={{flex:1}}>Suivant →</Btn>
          :<Btn active onClick={()=>onDone(d)} style={{flex:1}}>Générer ✓</Btn>
        }
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  SESSION SETUP — édition des exercices & rep ranges d'une séance
// ══════════════════════════════════════════════════════════════
function SessionSetup({session,customDB,onBack,freeMode}){
  const[exercises,setExercises]=useState(()=>session.exercises.map(e=>({...e,sets:e.sets.map(s=>({...s}))})));
  const[showAdd,setShowAdd]=useState(session.exercises.length===0);
  const updEx=(id,u)=>setExercises(p=>p.map(e=>e.id===id?u:e));
  const delEx=(id)=>setExercises(p=>p.filter(e=>e.id!==id));
  // Toujours FreeExPicker : choix libre parmi tous les exercices, quel que soit le mode
  const addEx=(mk,pk,pd,exName)=>{
    setExercises(p=>[...p,{id:uid(),pattern:pd.label,muscle:mk,repRange:RR[pk]||"8-12",alts:[exName],sel:0,sets:[1,2,3].map(n=>({id:uid(),n,kg:"",reps:"",rir:"",repRange:RR[pk]||"8-12"})),note:""}]);
    setShowAdd(false);
  };
  const moveEx=(idx,dir)=>setExercises(p=>{
    const a=[...p];
    const to=idx+dir;
    if(to<0||to>=a.length)return a;
    [a[idx],a[to]]=[a[to],a[idx]];
    return a;
  });
  return(
    <div style={col({paddingBottom:80})}>
      <div style={{padding:"18px 16px 14px",background:T.surface,borderBottom:"1px solid "+T.border,position:"sticky",top:0,zIndex:10}}>
        <div style={row({gap:12})}>
          <button onClick={()=>onBack({...session,exercises})} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:26,padding:0,lineHeight:1}}>‹</button>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,letterSpacing:1,lineHeight:1}}>{session.name}</div>
            <div style={{color:T.muted,fontSize:12}}>Exercices · Rep ranges par série</div>
          </div>
        </div>
      </div>
      <div style={{padding:16}}>
        {exercises.map((ex,i)=>(
          <div key={ex.id} style={{display:"flex",gap:6,alignItems:"flex-start",marginBottom:12}}>
            {/* Flèches de réordonnancement */}
            <div style={{display:"flex",flexDirection:"column",gap:3,paddingTop:14,flexShrink:0}}>
              <button onClick={()=>moveEx(i,-1)} disabled={i===0} style={{background:"none",border:"1px solid "+(i===0?T.border:"#333"),borderRadius:5,color:i===0?T.border:"#888",cursor:i===0?"default":"pointer",fontSize:14,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",padding:0,lineHeight:1}}>↑</button>

//  PROGRAM EDITOR — vue du programme, édition avant entraînement
// ══════════════════════════════════════════════════════════════
function ProgramEditor({sessions,program,onEditSession,onStart,onUpdateSessions}){
  const sd=program&&program.split!=="custom"?SPLITS[program.split]:null;
  const[showAdd,setShowAdd]=useState(false);
  const[addName,setAddName]=useState("");

  const moveSession=(idx,dir)=>{
    const to=idx+dir;
    if(to<0||to>=sessions.length)return;
    const a=[...sessions];
    [a[idx],a[to]]=[a[to],a[idx]];
    onUpdateSessions(a);
  };
  const deleteSession=(id)=>{
    if(sessions.length<=1)return;
    if(!window.confirm("Retirer cette séance du programme ?"))return;
    onUpdateSessions(sessions.filter(s=>s.id!==id));
  };
  const addSession=()=>{
    const nm=addName.trim();
    if(!nm)return;
    onUpdateSessions([...sessions,{id:uid(),type:"custom",name:nm,exercises:[]}]);
    setAddName("");setShowAdd(false);
  };

  return(
    <div style={col({padding:"20px 16px",gap:18,paddingBottom:90})}>

          {sd?sd.name:"Programme personnalisé"}
          {program&&program.days?" · "+program.days+"j/sem":""}

      </div>
      <div style={{background:T.card,border:"1px solid "+T.border,borderRadius:10,padding:"12px 14px"}}>
        <div style={{color:T.muted,fontSize:12,lineHeight:1.7}}>
          Appuie sur une séance pour modifier les exercices et régler les rep ranges de chaque série. Utilise les flèches pour changer l'ordre, ✕ pour retirer une séance. Valide ensuite pour commencer.
        </div>
      </div>
      <div style={col({gap:8})}>
        {sessions.map((s,i)=>(
          <div key={s.id} style={{display:"flex",gap:6,alignItems:"stretch"}}>
            <div style={{display:"flex",flexDirection:"column",gap:3,justifyContent:"center",flexShrink:0}}>

              <button onClick={()=>moveSession(i,1)} disabled={i===sessions.length-1} style={{background:"none",border:"1px solid "+(i===sessions.length-1?T.border:"#333"),borderRadius:5,color:i===sessions.length-1?T.border:"#888",cursor:i===sessions.length-1?"default":"pointer",fontSize:14,width:26,height:26,display:"flex",alignItems:"center",justifyContent:"center",padding:0,lineHeight:1}}>↓</button>
            </div>

              <div>
                <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:21,fontWeight:700,letterSpacing:1}}>{s.name}</div>
                <div style={{color:T.muted,fontSize:12,marginTop:2}}>
                  {s.exercises.length} exo(s)

// ══════════════════════════════════════════════════════════════
//  SESSION — logging des perfs
// ══════════════════════════════════════════════════════════════
function Session({session,week,log,onBack,onSave,customDB}){
  const lk="w"+week+"_"+session.id;
  const[exercises,setExercises]=useState(()=>{
    const saved=log[lk];
    // Aligner les séries du log sur la structure actuelle de la séance
    return session.exercises.map(refEx=>{
      const logEx=saved&&saved.find(e=>e.id===refEx.id);
      if(!logEx)return{...refEx,sets:refEx.sets.map(s=>({...s}))};
      // Garder uniquement les séries qui existent dans la définition actuelle
      const alignedSets=refEx.sets.map(refSet=>{
        const logSet=logEx.sets&&logEx.sets.find(s=>s.id===refSet.id);
        return logSet?{...refSet,...logSet}:{...refSet};
      });
      return{...logEx,sets:alignedSets};
    });
  });
  const[showAdd,setShowAdd]=useState(false);
  // Recherche de la perf précédente par NOM d'exercice (pas par position),
  // en remontant les semaines précédentes jusqu'à trouver une correspondance.
  const getPrevForExercise=(ex)=>{
    const curName=ex.alts&&ex.alts[ex.sel];
    if(!curName)return null;
    for(let w=week-1;w>=1;w--){
      const wkLog=log["w"+w+"_"+session.id];
      if(!wkLog)continue;
      const match=wkLog.find(e=>e.alts&&e.alts[e.sel]===curName);
      if(match&&match.sets&&match.sets.some(s=>s.kg))return match;
    }
    return null;
  };
  useEffect(()=>{onSave(lk,exercises);},[exercises]);
  const updEx=(id,u)=>setExercises(p=>p.map(e=>e.id===id?u:e));
  const delEx=(id)=>setExercises(p=>p.filter(e=>e.id!==id));
  const addEx=(mk,pk,pd,exName)=>{
    const alts=(pd.ex.length>=3?pd.ex:[...pd.ex,...pd.ex]).slice(0,3);
    setExercises(p=>[...p,{id:uid(),pattern:pd.label,muscle:mk,repRange:RR[pk]||"8-12",alts,sel:Math.max(0,alts.indexOf(exName)),sets:[1,2,3].map(n=>({id:uid(),n,kg:"",reps:"",rir:"",repRange:RR[pk]||"8-12"})),note:""}]);
    setShowAdd(false);
  };
  return(
    <div style={col({paddingBottom:80})}>
      <div style={{padding:"18px 16px 14px",background:T.surface,borderBottom:"1px solid "+T.border,position:"sticky",top:0,zIndex:10}}>
        <div style={row({gap:12})}>
          <button onClick={onBack} style={{background:"none",border:"none",color:T.muted,cursor:"pointer",fontSize:26,padding:0,lineHeight:1}}>‹</button>
          <div>
            <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:24,fontWeight:800,letterSpacing:1,lineHeight:1}}>{session.name}</div>
            <div style={{color:T.muted,fontSize:12}}>Semaine {week}</div>
          </div>
        </div>
      </div>
      <div style={{padding:16}}>
        {exercises.map((ex,i)=>(
          <ExCard key={ex.id} ex={ex} prevEx={getPrevForExercise(ex)} onChange={u=>updEx(ex.id,u)}/>
        ))}
      </div>
    </div>
  );
}

              {open[mk]&&Object.entries(mv.patterns||{}).map(([pk,pd])=>(
                <div key={pk} style={{borderTop:"1px solid "+T.border,padding:"10px 16px"}}>
                  <div style={{color:T.accent,fontSize:11,fontWeight:700,textTransform:"uppercase",letterSpacing:1,marginBottom:7}}>{pd.label}</div>
                  {pd.ex.map((e,i)=><div key={i} style={{padding:"3px 0",fontSize:13,color:T.muted,borderBottom:i<pd.ex.length-1?"1px solid "+T.border:"none"}}>{e}</div>)}
                </div>
              ))}
            </div>
          ))}
        </div>
      )}
      {!showAdd
        ?<Btn active onClick={()=>setShowAdd(true)} style={{fontSize:14,padding:14}}>+ Ajouter un exercice personnalisé</Btn>
        :(<div style={{background:T.card,border:"1px solid "+T.accent,borderRadius:14,padding:16}}>
          <div style={{fontFamily:"'Barlow Condensed',sans-serif",fontSize:20,fontWeight:700,letterSpacing:1,marginBottom:14}}>Nouvel exercice</div>
          <div style={col({gap:10})}>
            <div><div style={{color:T.muted,fontSize:11,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Nom</div><input value={nex.name} onChange={e=>setNex(p=>({...p,name:e.target.value}))} placeholder="Ex: Curl poulie haute" style={inp()}/></div>
            <div><div style={{color:T.muted,fontSize:11,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Groupe musculaire</div><select value={nex.muscle} onChange={e=>setNex(p=>({...p,muscle:e.target.value,pk:""}))} style={inp()}>{Object.entries(DB).map(([k,v])=><option key={k} value={k}>{v.label}</option>)}</select></div>
            <div><div style={{color:T.muted,fontSize:11,marginBottom:4,textTransform:"uppercase",letterSpacing:1}}>Pattern</div><select value={nex.pk} onChange={e=>setNex(p=>({...p,pk:e.target.value}))} style={inp()}><option value="">-- Choisir --</option>{Object.entries((DB[nex.muscle]&&DB[nex.muscle].patterns)||{}).map(([pk,pd])=><option key={pk} value={pk}>{pd.label}</option>)}</select></div>
            <div style={row({gap:8})}>
              <Btn onClick={()=>setShowAdd(false)} style={{flex:1}}>Annuler</Btn>
              <Btn active onClick={()=>{if(!nex.name||!nex.pk)return;onAddCustom(nex.muscle,nex.pk,nex.name);setShowAdd(false);setNex({name:"",muscle:"pectoraux",pk:""});}} disabled={!nex.name||!nex.pk} style={{flex:1}}>Ajouter ✓</Btn>
            </div>
          </div>
        </div>)}
    </div>
  );
}

// ══════════════════════════════════════════════════════════════
//  APP
// ══════════════════════════════════════════════════════════════
function App(){
  const[syncCode,setSyncCode]=useState(localStorage.getItem(SYNC_KEY));
  const[state,setState]=useState(defaults());
  const[ready,setReady]=useState(false);
  const[view,setView]=useState("home");
  const[activeSession,setActiveSession]=useState(null);
  const[editingSession,setEditingSession]=useState(null);
  const[isManual,setIsManual]=useState(false);
  const saveTimer=useRef(null);

  useEffect(()=>{
    if(!syncCode)return;
    fbLoad(syncCode).then(data=>{
      if(data)setState(data);
      setView(data&&data.program?"home":"setup");
      setReady(true);
    });
  },[syncCode]);

  useEffect(()=>{
    if(!syncCode||!ready)return;
    if(saveTimer.current)clearTimeout(saveTimer.current);
    saveTimer.current=setTimeout(()=>fbSave(syncCode,state),2000);
    return()=>clearTimeout(saveTimer.current);
  },[state,ready,syncCode]);

  const upd=useCallback((patch)=>setState(s=>({...s,...patch})),[]);

  const handleSync=(code,data)=>{
    setSyncCode(code);
    if(data)setState(data);
    setView(data&&data.program?"home":"setup");
    setReady(true);
  };

  // Après setup assisté → program_editor pour review/config
  const handleSetupDone=(d)=>{
    const sd=SPLITS[d.split],sched=sd.schedules[d.days];
    const sessions=sched.map((type,i)=>({
      id:uid(),type,
      name:"J"+(i+1)+" – "+sd.sessions[type].name,
      exercises:buildExercises(type,sd,d.priority,d.exCount,state.customDB)
    }));
    upd({program:{split:d.split,days:d.days,exCount:d.exCount,priority:d.priority},sessions,log:{},week:1});
    setView("program_editor");
  };

  // Après création de zéro → program_editor pour review
  const handleProgramBuilderDone=(sessions)=>{
    upd({program:{split:"custom",days:sessions.length,exCount:0,priority:[]},sessions,log:{},week:1});
    setView("program_editor");
  };

  const handleSave=(key,exercises)=>upd({log:{...state.log,[key]:exercises}});

  const handleAddCustom=(muscle,pk,name)=>{
    const cur=state.customDB[muscle]||{label:(DB[muscle]&&DB[muscle].label)||muscle,patterns:{}};
    const existPat=(DB[muscle]&&DB[muscle].patterns[pk])||{label:pk,ex:[]};
    const curPat=cur.patterns[pk]||{...existPat,ex:[...existPat.ex]};
    if(curPat.ex.includes(name))return;
    if(DB[muscle]&&DB[muscle].patterns[pk]&&!DB[muscle].patterns[pk].ex.includes(name))DB[muscle].patterns[pk].ex.push(name);
    upd({customDB:{...state.customDB,[muscle]:{...cur,patterns:{...cur.patterns,[pk]:{...curPat,ex:[...curPat.ex,name]}}}}});
  };

  const handleEditSession=(s)=>{ setEditingSession(s); setView("session_setup"); };

  const handleSessionSetupBack=(updatedSession)=>{
    upd({sessions:state.sessions.map(s=>s.id===updatedSession.id?updatedSession:s)});
    setEditingSession(null);
    setView("program_editor");
  };

  if(!syncCode)return React.createElement(SyncScreen,{onSync:handleSync});
  if(!ready)return React.createElement("div",{style:{background:T.bg,minHeight:"100vh",display:"flex",alignItems:"center",justifyContent:"center",color:T.muted,fontFamily:"'DM Sans',sans-serif",fontSize:16}},"Chargement...");

  const hideNav=["setup","program_builder","session_setup"].includes(view);

  return(
    <div style={{background:T.bg,minHeight:"100vh",fontFamily:"'DM Sans',sans-serif",color:T.text,paddingBottom:state.program&&!hideNav?68:0,maxWidth:600,margin:"0 auto"}}>
      {view==="setup"&&<Setup onDone={handleSetupDone} onCustom={()=>setView("program_builder")}/>}
      {view==="program_builder"&&<ProgramBuilder onDone={handleProgramBuilderDone} onBack={()=>setView("setup")} customDB={state.customDB}/>}
      {view==="program_editor"&&<ProgramEditor sessions={state.sessions} program={state.program} onEditSession={handleEditSession} onStart={()=>setView("home")} onUpdateSessions={(newSessions)=>upd({sessions:newSessions})}/>}
      {view==="session_setup"&&editingSession&&<SessionSetup session={editingSession} customDB={state.customDB} onBack={handleSessionSetupBack} freeMode={state.program&&state.program.split==="custom"}/>}
      {view==="home"&&<Home state={state} syncCode={syncCode} setWeek={fn=>upd({week:fn(state.week)})} onOpen={s=>{setActiveSession(s);setIsManual(false);setView("session");}} onManual={()=>{setIsManual(true);setView("session");}} onReset={()=>{upd({...defaults(),customDB:state.customDB});setView("setup");}}/>}
      {view==="session"&&!isManual&&activeSession&&<Session session={activeSession} week={state.week} log={state.log} onBack={()=>setView("home")} onSave={handleSave} customDB={state.customDB}/>}
      {view==="session"&&isManual&&<ManualSession week={state.week} onBack={()=>setView("home")} onSave={handleSave} customDB={state.customDB}/>}
      {view==="library"&&<Library customDB={state.customDB} onAddCustom={handleAddCustom}/>}
      {state.program&&!hideNav&&(
        <nav style={{position:"fixed",bottom:0,left:"50%",transform:"translateX(-50%)",width:"100%",maxWidth:600,background:T.surface,borderTop:"1px solid "+T.border,display:"flex",zIndex:100}}>
          {[
            {id:"home",label:"Accueil",icon:"⌂"},
            {id:"program_editor",label:"Programme",icon:"◈"},
            {id:"library",label:"Exercices",icon:"≡"}
          ].map(tab=>(
            <button key={tab.id} onClick={()=>setView(tab.id)} style={{flex:1,padding:"10px 0",background:"none",border:"none",color:view===tab.id?T.accent:T.muted,cursor:"pointer",display:"flex",flexDirection:"column",alignItems:"center",gap:2}}>
              <span style={{fontSize:22}}>{tab.icon}</span>
              <span style={{fontSize:10,fontFamily:"'DM Sans',sans-serif"}}>{tab.label}</span>
            </button>
          ))}
        </nav>
      )}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
</script>
</body>
</html>
